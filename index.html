<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор Песиків 🐶</title>
    <style>
        /* Стилі для краси */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            text-align: center;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 450px;
        }

        h1 {
            color: #4a4a4a;
            font-size: 24px;
            margin-bottom: 20px;
        }

        button {
            background-color: #ff6b6b;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        button:hover {
            background-color: #ee5253;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        #dog-container {
            margin-top: 25px;
            width: 100%;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 12px;
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff6b6b;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Твій особистий песик 🐾</h1>
        <button onclick="getDoggy()">Натисни для радості!</button>

        <div id="dog-container">
            <p style="color: #888;">Тут з'явиться пухнастик</p>
        </div>
    </div>

    <script>
        async function getDoggy() {
            const container = document.getElementById('dog-container');
            
            // Показуємо анімацію завантаження
            container.innerHTML = '<div class="loader"></div>';
            
            try {
                // Виклик безкоштовного API
                const response = await fetch('https://dog.ceo/api/breeds/image/random');
                const data = await response.json();
                
                // Вставляємо картинку
                container.innerHTML = `<img src="${data.message}" alt="Милий песик">`;
            } catch (error) {
                container.innerHTML = '<p style="color: red;">Ой! Песики втекли гратися. Спробуй ще раз!</p>';
                console.error('Помилка:', error);
            }
        }
    </script>

</body>
</html>
