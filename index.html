<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Chat Test & Double Joy 🐶🌸</title>
    
    <script async src="https://d1kp6vowr9jauh.cloudfront.net/pulsepix.js" data-project-id="40925778-598e-45ad-af64-81944d848dbe"></script>

    <style>
        /* === Твої оригінальні стилі (не чіпаю, але додаю нові нижче) === */
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f9f9f9;
        }
        h1 {
            color: #333;
        }
        img.original-img { /* Додав клас, щоб не ламати оригінальне фото */
            max-width: 100%;
            height: auto;
            margin: 20px 0;
        }
        .message {
            font-size: 1.2em;
            color: #555;
            margin-top: 20px;
        }

        /* === НОВІ СТИЛІ ДЛЯ ДВОХ ВІКОН (не ламають body) === */
        .page-header {
            margin-bottom: 40px;
        }

        .main-container {
            display: flex;
            flex-wrap: wrap; /* Щоб на мобільних переносилися */
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 400px;
            max-width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1.card-title {
            color: #333;
            font-size: 22px;
            margin-bottom: 20px;
        }

        /* Універсальний стиль для кнопок у картках */
        .action-button {
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        /* Колір кнопки для собак (рожевий, як був) */
        .action-button.dog {
            background-color: #ffc0cb;
        }
        .action-button.dog:hover { background-color: #ffb1bc; transform: translateY(-2px); }

        /* Колір кнопки для Віталіка (фіолетовий) */
        .action-button.anime {
            background-color: #9b59b6;
        }
        .action-button.anime:hover { background-color: #8e44ad; transform: translateY(-2px); }

        .media-container {
            margin-top: 20px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .media-container img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="card">
            <h1 class="card-title">Ось твій особистий песик:</h1>
            
            <button class="action-button dog" onclick="
                if(window.SP_PIN) {
                    window.SP_PIN.fireEvent('c0954e75-3228-4976-9d4a-9615c63a069c', {
                        'testing-ref-text-on-pixel': 'value',
                        'testing-ref-integer-on-pixel': 123
                    });
                }
                getDoggy();
            ">Викликаю песика 🐾</button>

            <div id="dog-container" class="media-container">
               <p style="color: #999;">Натискай, підніми собі настрій!</p>
            </div>
        </div>

        <div class="card">
            <h1 class="card-title">А это для Виталика</h1>
            
            <button class="action-button anime" onclick="
                if(window.SP_PIN) {
                    window.SP_PIN.fireEvent('vitalik-button-click', {
                        'type': 'anime',
                        'for_user': 'Vitalik'
                    });
                }
                getAnimeGirl();
            ">Я Виталик</button>

            <div id="anime-container" class="media-container">
               <p style="color: #999;">Виталий, жги! Нажимай.</p>
            </div>
        </div>

    </div>

    <script>
      const messages = [
        "Have an amazing day! Слава Україні!",
        "Keep smiling, honey, it suits you! Слава Україні!",
        "Make today unforgettable! Слава Україні!",
        "Stay positive and shine bright! Слава Україні!",
        "You can achieve anything today! Слава Україні!",
      ];

      const randomMessage =
        messages[Math.floor(Math.random() * messages.length)];

      document.getElementById("dailyMessage").textContent = randomMessage;
    </script>

    <script src="https://cdn.pulse.is/livechat/loader.js" data-live-chat-id="67dabb1cdf0ebc184203d1aa" async></script>

    <script>
      document.addEventListener("spLiveChatLoaded", function () {
        window.sp.liveChat.config({
          colorScheme: "auto",
          // primaryColor: "#FFB347",
          chatPosition: {
            bottom: "80px",
            right: "90px",
          },
          height: '720px',
          language: "tr",
           
          custom_img_button: {
            url: "https://cheline.com.ua/wp-content/uploads/2022/10/311129648_417083410597011_4202621040900234238_n-780x470.jpg",
            hover_url: "https://landmarks.in.ua/images/25chernihiv-dytynets1000x667chernihivska.jpg",
          },
        });
      });
    </script>

    <script>
        // Оригінальна функція для песиків (оновлена, як ми домовлялися)
        async function getDoggy() {
            const container = document.getElementById('dog-container');
            container.innerHTML = '<p>Шукаємо песика...</p>';
            try {
                const response = await fetch('https://dog.ceo/api/breeds/image/random');
                if (!response.ok) throw new Error('Network error');
                const data = await response.json();
                container.innerHTML = `<img src="${data.message}" alt="Песик">`;
            } catch (error) {
                container.innerHTML = '<p style="color: red;">Мережа барахлить. Спробуй ще раз!</p>';
            }
        }

        // Нова функція для аніме дівчат
        async function getAnimeGirl() {
            const container = document.getElementById('anime-container');
            container.innerHTML = '<p>Ищем самую няшную...</p>';
            try {
                // Використовуємо waifu.pics API
                const response = await fetch('https://api.waifu.pics/sfw/neko'); // Можна змінити /neko на /waifu
                if (!response.ok) throw new Error('Network error');
                const data = await response.json();
                container.innerHTML = `<img src="${data.url}" alt="Аниме девочка">`;
            } catch (error) {
                container.innerHTML = '<p style="color: red;">Помилка завантаження. Спробуй ще раз!</p>';
            }
        }
    </script>

</body>
</html>
