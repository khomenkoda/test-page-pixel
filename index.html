<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор Песиків + PulsePix 🐶</title>
    
    <script async src="https://d1kp6vowr9jauh.cloudfront.net/pulsepix.js" data-project-id="baf9d3dd-0fe7-4135-bc5a-b399f4c17154"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f5fafe 0%, #e2eafc 100%);
            text-align: center;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 400px;
            max-width: 90%;
        }
        h1 { color: #333; font-size: 22px; }
        button {
            background-color: #ffc0cb;
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background-color: #0056b3; transform: translateY(-2px); }
        #dog-container { margin-top: 20px; min-height: 250px; display: flex; align-items: center; justify-content: center; }
        img { max-width: 100%; border-radius: 10px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="card">
        <h1>Ось твій особистий песик:</h1>
        <button onclick="getDoggy()"<p>Генерувати радість 🐾</button>

        <div id="dog-container">
            <p style="color: #999;" натискай - підніми собі настрій/p>
        </div>
    </div>

    <script>
        async function getDoggy() {
            // 1. Викликаємо твій скрипт PulsePix (якщо він має API для запуску)
            // Більшість таких скриптів автоматично відстежують події, 
            // але ми додаємо цей виклик для певності, якщо він ініціалізується вручну:
            if (window.pulsepix) {
                console.log("PulsePix активується...");
            }

            const container = document.getElementById('dog-container');
            container.innerHTML = '<p>Шукаємо песика...</p>';
            
            try {
                // 2. Отримуємо фото песика через безкоштовне API
                const response = await fetch('https://dog.ceo/api/breeds/image/random');
                const data = await response.json();
                
                // 3. Відображаємо результат
                container.innerHTML = `<img src="${data.message}" alt="Песик">`;
            } catch (error) {
                container.innerHTML = '<p>Помилка завантаження. Спробуй ще раз!</p>';
            }
        }
    </script>

</body>
</html>
