<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Chat Test & Double Joy 🐶🌸</title>
    
    <script async src="https://d1kp6vowr9jauh.cloudfront.net/pulsepix.js" data-project-id="f27394a8-251c-4326-8e08-6dfbbf9822e5"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f9f9f9;
        }
        .main-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 400px;
            max-width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1.card-title {
            color: #333;
            font-size: 22px;
            margin-bottom: 20px;
        }
        .action-button {
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .action-button.dog {
            background-color: #ffc0cb;
        }
        .action-button.dog:hover { background-color: #ffb1bc; transform: translateY(-2px); }

        .action-button.anime {
            background-color: #9b59b6;
        }
        .action-button.anime:hover { background-color: #8e44ad; transform: translateY(-2px); }

        .media-container {
            margin-top: 20px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .media-container img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            animation: fadeIn 0.5s;
        }
        #dailyMessage {
            margin-bottom: 20px;
            font-size: 1.2em;
            color: #555;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <p id="dailyMessage"></p>

    <div class="main-container">
        
        <div class="card">
            <h1 class="card-title">Ось твій особистий песик:</h1>
            
            <button class="action-button dog" onclick="
                if(window.SP_PIN) {
                    window.SP_PIN.fireEvent('883c1dc0-1aae-496d-a669-edc806e63fe2', {
                        somevalue: 'value'
                    });
                }
                getDoggy();
            ">Викликаю песика 🐾</button>

            <div id="dog-container" class="media-container">
                <p style="color: #999;">Натискай, підніми собі настрій!</p>
            </div>
        </div>

        <div class="card">
            <h1 class="card-title">А это для Виталика</h1>
            
            <button class="action-button anime" onclick="
                if(window.SP_PIN) {
                    window.SP_PIN.fireEvent('e5610371-01b6-4a21-a43c-0f932d1ccf85', {
                        somevaluehere: 'value',
                        someintegerhereis: 123
                    });
                }
                getAnimeGirl();
            ">Я Виталик</button>

            <div id="anime-container" class="media-container">
                <p style="color: #999;">Виталий, жги! Нажимай.</p>
            </div>
        </div>

    </div>

    <script>
      // Рандомні повідомлення
      const messages = [
        "Have an amazing day! Слава Україні!",
        "Keep smiling, honey, it suits you! Слава Україні!",
        "Make today unforgettable! Слава Україні!",
        "Stay positive and shine bright! Слава Україні!",
        "You can achieve anything today! Слава Україні!",
      ];
      const randomMessage = messages[Math.floor(Math.random() * messages.length)];
      const msgElem = document.getElementById("dailyMessage");
      if(msgElem) msgElem.textContent = randomMessage;

      // Функція для песиків
      async function getDoggy() {
          const container = document.getElementById('dog-container');
          container.innerHTML = '<p>Шукаємо песика...</p>';
          try {
              const response = await fetch('https://dog.ceo/api/breeds/image/random');
              const data = await response.json();
              container.innerHTML = `<img src="${data.message}" alt="Песик">`;
          } catch (error) {
              container.innerHTML = '<p style="color: red;">Помилка завантаження.</p>';
          }
      }

      // Функція для аніме
      async function getAnimeGirl() {
          const container = document.getElementById('anime-container');
          container.innerHTML = '<p>Ищем самую няшную...</p>';
          try {
              const response = await fetch('https://api.waifu.pics/sfw/neko');
              const data = await response.json();
              container.innerHTML = `<img src="${data.url}" alt="Аниме девочка">`;
          } catch (error) {
              container.innerHTML = '<p style="color: red;">Помилка завантаження.</p>';
          }
      }
    </script>

</body>
</html>
